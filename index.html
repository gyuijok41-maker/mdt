<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МТД - Живой Интернет Директ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* Экран авторизации */
        #auth-screen { display: none; background: #121212; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #262626; margin: 10px; }
        .logo { font-size: 36px; font-weight: bold; margin-bottom: 20px; font-style: italic; background: linear-gradient(45deg, #f09433, #bc1888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input, button { width: 100%; padding: 12px; margin-top: 15px; border-radius: 8px; border: none; outline: none; }
        input { background: #000; color: #fff; border: 1px solid #262626; font-size: 14px; }
        button { background: #0095f6; color: white; font-weight: bold; cursor: pointer; }
        .username-preview { margin-top: 8px; font-size: 13px; color: #0095f6; font-weight: 600; text-align: left; padding-left: 5px; min-height: 18px; }
        
        /* Выбор аватарки-эмодзи */
        .avatar-picker { display: flex; justify-content: space-around; margin: 15px 0; }
        .avatar-option { width: 50px; height: 50px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; background: #262626; font-size: 30px; text-align: center; line-height: 50px; user-select: none; }
        .avatar-option.selected { border-color: #0095f6; }
        
        /* Главный экран чата */
        #chat-screen { display: none; width: 100%; max-width: 935px; height: 100vh; background: #000; }
        @media (min-width: 600px) { #chat-screen { height: 90vh; border: 1px solid #262626; border-radius: 12px; } }
        .chat-layout { display: flex; height: 100%; }
        
        /* Боковая панель (Сайдбар) */
        .sidebar { width: 40%; border-right: 1px solid #262626; display: flex; flex-direction: column; background: #000; }
        @media (min-width: 600px) { .sidebar { width: 35%; } }
        .my-profile { padding: 15px; border-bottom: 1px solid #262626; display: flex; align-items: center; gap: 10px; }
        .avatar-img { width: 40px; height: 40px; border-radius: 50%; background: #262626; display: inline-block; vertical-align: middle; font-size: 20px; text-align: center; line-height: 40px; text-transform: uppercase; border: 1px solid #333; user-select: none; }
        .search-box { padding: 10px 15px; border-bottom: 1px solid #121212; }
        .search-box input { margin: 0; padding: 8px 12px; background: #121212; border-radius: 8px; }
        .section-title { padding: 12px 15px 5px 15px; font-size: 12px; color: #8e8e8e; font-weight: bold; }
        .users-list-container { overflow-y: auto; flex-grow: 1; }
        
        /* Элемент пользователя в списке */
        .user-item { display: flex; align-items: center; padding: 12px 15px; cursor: pointer; gap: 12px; border-bottom: 1px solid #121212; }
        .user-item:hover, .user-item.active { background: #121212; }
        .user-info { display: flex; flex-direction: column; }
        
        /* Область чата */
        .chat-area { width: 60%; display: flex; flex-direction: column; background: #000; }
        @media (min-width: 600px) { .chat-area { width: 65%; } }
        .chat-header { padding: 15px; border-bottom: 1px solid #262626; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .messages-box { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* Сообщения */
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 14px; word-wrap: break-word; line-height: 1.4; }
        .msg.sent { background: #3797f0; color: #fff; align-self: flex-end; }
        .msg.received { background: #262626; color: #fff; align-self: flex-start; }
        
        /* Поле ввода сообщений */
        .chat-footer { padding: 15px; border-top: 1px solid #262626; display: flex; gap: 10px; background: #000; }
        .chat-footer input { margin: 0; background: #121212; border-radius: 20px; padding: 10px 15px; }
        .chat-footer button { margin: 0; width: auto; padding: 0 20px; border-radius: 20px; }
    </style>
    <!-- Подключаем Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <!-- Экран регистрации/входа -->
    <div id="auth-screen">
        <div class="logo">мтд</div>
        <h3>Создать аккаунт</h3>
        <input type="text" id="username-input" placeholder="Введите ваш ник..." maxlength="15" oninput="previewUserTag()">
        <div class="username-preview" id="user-tag-preview"></div>
        <div class="avatar-picker">
            <div class="avatar-option selected" data-emoji="🐱" onclick="selectAvatar(this)">🐱</div>
            <div class="avatar-option" data-emoji="🦊" onclick="selectAvatar(this)">🦊</div>
            <div class="avatar-option" data-emoji="🐸" onclick="selectAvatar(this)">🐸</div>
            <div class="avatar-option" data-emoji="🥷" onclick="selectAvatar(this)">🥷</div>
        </div>
        <button onclick="login()">Войти в сеть</button>
    </div>

    <!-- Основной интерфейс мессенджера -->
    <div id="chat-screen">
        <div class="chat-layout">
            <!-- Боковая панель -->
            <div class="sidebar">
                <div class="my-profile">
                    <div id="my-avatar" class="avatar-img"></div>
                    <span id="my-username" style="font-weight: bold; font-size: 14px; word-break: break-all;"></span>
                </div>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Поиск по нику..." oninput="searchPeople()">
                </div>
                <div class="section-title" id="list-title">ДИАЛОГИ:</div>
                <div class="users-list-container" id="sidebar-users"></div>
            </div>
            
            <!-- Окно переписки -->
            <div class="chat-area">
                <div class="chat-header">
                    <div id="chat-with-avatar" class="avatar-img" style="display: none;"></div>
                    <span id="chat-with-name">Выберите чат</span>
                </div>
                <div class="messages-box" id="messages-box"></div>
                <div class="chat-footer">
                    <input type="text" id="message-input" placeholder="Сообщение...">
                    <button onclick="sendMessage()">ОТП</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Инициализация базы данных
        const firebaseConfig = {
            databaseURL: "https://mtd-chat-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let myUserTag = "";
        let myAvatarUrl = "🐱";
        let activeChatUser = null;
        let globalUsersList = {};

        // Проверка сохранённой сессии при старте страницы
        window.onload = function() {
            const savedTag = localStorage.getItem('mtd_user_tag');
            const savedAvatar = localStorage.getItem('mtd_user_avatar');

            if (savedTag && savedAvatar) {
                myUserTag = savedTag;
                myAvatarUrl = savedAvatar;
                startSession();
            } else {
                document.getElementById('auth-screen').style.display = 'block';
            }
        };

        function previewUserTag() {
            const input = document.getElementById('username-input').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
            document.getElementById('user-tag-preview').innerText = input ? `@${input}mdt` : '';
        }

        function selectAvatar(element) {
            document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            myAvatarUrl = element.getAttribute('data-emoji');
        }

        function login() {
            const rawInput = document.getElementById('username-input').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
            if (!rawInput) return alert("Придумайте ник!");
            myUserTag = `${rawInput}mdt`;

            // Сохраняем в локальную память устройства
            localStorage.setItem('mtd_user_tag', myUserTag);
            localStorage.setItem('mtd_user_avatar', myAvatarUrl);

            startSession();
        }

        function startSession() {
            // Запись юзера в Firebase
            database.ref('users/' + myUserTag).set({
                avatar: myAvatarUrl,
                lastSeen: Date.now()
            });

            // Статус "офлайн" при закрытии вкладки
            database.ref('users/' + myUserTag + '/lastSeen').onDisconnect().set(0);

            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('my-avatar').innerText = myAvatarUrl;
            document.getElementById('my-username').innerText = `@${myUserTag}`;

            // Постоянное обновление статуса "онлайн"
            setInterval(() => {
                database.ref('users/' + myUserTag + '/lastSeen').set(Date.now());
            }, 2000);

            // Получение списка зарегистрированных пользователей
            database.ref('users').on('value', (snapshot) => {
                globalUsersList = snapshot.val() || {};
                renderDialogsList();
            });

            // Отслеживание появления новых сообщений
            database.ref('chats').on('value', () => {
                if (activeChatUser) {
                    renderMessages();
                }
            });
        }

        function searchPeople() {
            renderDialogsList();
        }

        // Рендеринг списка пользователей с "Умным" поиском
        function renderDialogsList() {
            const container = document.getElementById('sidebar-users');
            
            // Фильтруем поисковый запрос (убираем @ и mdt на конце)
            let query = document.getElementById('search-input').value.trim().toLowerCase().replace('@', '');
            if (query.endsWith('mdt')) {
                query = query.slice(0, -3);
            }
            
            container.innerHTML = '';
            let count = 0;

            for (let tag in globalUsersList) {
                if (tag === myUserTag) continue; // Не показываем себя в поиске
                
                // Проверяем совпадение по очищенному запросу
                if (query && !tag.includes(query)) continue;

                count++;
                const activeClass = tag === activeChatUser ? 'active' : '';
                const isOnline = (Date.now() - globalUsersList[tag].lastSeen < 6000);
                const statusColor = isOnline ? '#0095f6' : '#555';
                const statusText = isOnline ? '● в сети' : 'офлайн';
                const userAvatar = globalUsersList[tag].avatar || "👤";

                const item = `
                    <div class="user-item ${activeClass}" onclick="startChat('${tag}', '${userAvatar}')">
                        <div class="avatar-img">${userAvatar}</div>
                        <div class="user-info">
                            <span style="font-weight:600; font-size:13px;">@${tag}</span>
                            <span style="font-size:11px; color:${statusColor}">${statusText}</span>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', item);
            }

            if(count === 0) {
                container.innerHTML = `<div style="padding:20px; color:#555; font-size:13px; text-align:center;">Пользователь не найден.<br>Убедитесь, что он вошел в сеть.</div>`;
            }
        }

        // Переключение на чат с пользователем
        function startChat(userTag, avatar) {
            activeChatUser = userTag;
            document.getElementById('chat-with-name').innerText = `@${userTag}`;
            const headerAvatar = document.getElementById('chat-with-avatar');
            headerAvatar.innerText = avatar;
            headerAvatar.style.display = 'inline-block';
            renderMessages();
        }

        // Загрузка сообщений из Firebase
        function renderMessages() {
            const box = document.getElementById('messages-box');
            if (!activeChatUser) return;

            // Генерируем уникальный ID чата (кто первый по алфавиту, тот идет первым в ID)
            const chatId = myUserTag < activeChatUser ? `${myUserTag}_${activeChatUser}` : `${activeChatUser}_${myUserTag}`;

            database.ref('chats/' + chatId).once('value', (snapshot) => {
                const messages = snapshot.val() || {};
                box.innerHTML = '';
                
                for (let id in messages) {
                    const m = messages[id];
                    const div = document.createElement('div');
                    div.classList.add('msg', m.from === myUserTag ? 'sent' : 'received');
                    div.innerText = m.text;
                    box.appendChild(div);
                }
                box.scrollTop = box.scrollHeight; // Автоматический скролл вниз к новым сообщениям
            });
        }

        // Отправка сообщений в Firebase
        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text || !activeChatUser) return;

            const chatId = myUserTag < activeChatUser ? `${myUserTag}_${activeChatUser}` : `${activeChatUser}_${myUserTag}`;

            database.ref('chats/' + chatId).push({
                from: myUserTag,
                text: text,
                timestamp: Date.now()
            });

            input.value = '';
            setTimeout(renderMessages, 100);
        }

        // Отправка по нажатию кнопки Enter
        document.getElementById('message-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
